<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>체크리스트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=2.3"> <!-- 캐시 문제 해결을 위한 버전 업데이트 -->
</head>

<body>

<div class="card">
<h2 id="todayTitle"></h2>

<!-- 화면1 -->
<div id="screen1" class="section">
  <input type="number" id="countInput" placeholder="몇개의 항목을 생성하실건가요?" min="1" max="50">
  <button class="main-btn" id="goToScreen2">다음</button>
</div>

<!-- 화면2 -->
<div id="screen2" class="section hidden"></div>
<button id="backTo1" class="back-btn hidden">뒤로가기</button>
<button id="completeBtn" class="main-btn hidden">완료</button>

<!-- 화면3 -->
<div id="screen3" class="section hidden"></div>
<button id="backTo2" class="back-btn hidden">뒤로가기</button>

</div>

<!-- 비밀번호 확인 모달 -->
<div id="passwordModal" class="modal-overlay hidden">
  <div class="modal-content">
    <h3>비밀번호 입력</h3>
    <p>이전 화면으로 돌아가려면<br>비밀번호를 입력하세요.</p>
    <input type="password" id="passwordInput" placeholder="비밀번호">
    <div class="modal-buttons">
      <button id="cancelPassword" class="back-btn">취소</button>
      <button id="confirmPassword" class="main-btn">확인</button>
    </div>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
